<!DOCTYPE html>
<html lang="fr-CA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci ! Votre demande est envoyée — NéoSpray</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath fill='%230e7c86' d='M16 2C16 2 6 14 6 21a10 10 0 0 0 20 0C26 14 16 2 16 2z'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--brand:#0e7c86;--brand-dark:#0a565d;--brand-tint:#e7f4f5;--ink:#12262e;--muted:#5c6f77}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,sans-serif;color:var(--ink);background:linear-gradient(180deg,var(--brand-tint),#fff);min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center;line-height:1.6}
  .box{max-width:520px}
  .check{width:88px;height:88px;margin:0 auto 26px;border-radius:50%;background:var(--brand);display:grid;place-items:center;color:#fff;box-shadow:0 14px 34px -12px rgba(10,86,93,.6)}
  h1{font-family:'Poppins';font-size:2rem;font-weight:800;margin-bottom:14px}
  p{color:var(--muted);font-size:1.08rem;margin-bottom:10px}
  .btn{display:inline-flex;align-items:center;gap:9px;margin-top:26px;font-family:'Poppins';font-weight:600;background:var(--brand);color:#fff;padding:14px 28px;border-radius:999px;text-decoration:none;transition:background .15s}
  .btn:hover{background:var(--brand-dark)}
  .small{font-size:.92rem;margin-top:24px}
</style>
</head>
<body>
  <div class="box">
    <div class="check"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
    <h1>Merci ! Votre demande est envoyée.</h1>
    <p>On a bien reçu vos informations et vos photos.</p>
    <p>On vous revient rapidement avec votre <strong>prix exact, tout inclus</strong>.</p>
    <a href="/" class="btn">← Retour à l'accueil</a>
    <p class="small">Une urgence ou une question ? Appelez-nous au <strong>(581)&nbsp;922-0377</strong>.</p>
  </div>
</body>
</html>
